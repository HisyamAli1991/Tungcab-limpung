const STATUS_LABELS = ["Belum Dikunjungi","Sudah Dikunjungi","Tidak Ada di Rumah","Sudah Bayar"];
const STATUS_BG = ["#e5e7eb","#bbf7d0","#fde68a","#bfdbfe"];
const STATUS_FG = ["#374151","#065f46","#92400e","#1e40af"];
const BORDER_COLORS = ["#e2e8f0","#10b981","#f59e0b","#3b82f6"];

const rp = n => "Rp " + Math.round(n).toLocaleString("id-ID");
const totalDenda = DATA.reduce((a,d)=>a+d.denda,0);

let fbData = {}; // {no: {status, catatan, updatedBy, updatedAt}}
let currentNo = null;
let activeTab = "daftar";
let filterProduk = "Semua";
let filterStatus = "Semua";

// Listen Firebase
const kunjunganRef = ref(db, "kunjungan_murabahah");
onValue(kunjunganRef, (snap) => {
  fbData = snap.val() || {};
  document.getElementById("sync-status").textContent = "Terhubung · Realtime";
  renderList();
  renderRekap();
  if (currentNo) updateModalStatus();
});

window.switchTab = (tab) => {
  activeTab = tab;
  document.getElementById("tab-daftar").style.display = tab==="daftar"?"block":"none";
  document.getElementById("tab-rekap").style.display = tab==="rekap"?"block":"none";
  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active", (i===0&&tab==="daftar")||(i===1&&tab==="rekap"));
  });
  if(tab==="rekap") renderRekap();
};

// Filter buttons
const buildFilters = () => {
  const row = document.getElementById("filter-row");
  const options = ["Semua",...STATUS_LABELS];
  row.innerHTML = options.map(s=>`
    <button class="filter-btn${filterStatus===s?" active":""}" onclick="setFilter('${s}')">${s}</button>
  `).join("");
};

const buildProdukFilters = () => {
  const row = document.getElementById("filter-produk-row");
  const options = ["Semua","Murabahah","Musyarakah"];
  row.innerHTML = options.map(p=>`
    <button class="filter-btn${filterProduk===p?" active":""}" onclick="setProdukFilter('${p}')">${p}</button>
  `).join("");
};

window.setProdukFilter = (p) => { filterProduk=p; buildProdukFilters(); renderList(); };

window.setFilter = (s) => { filterStatus=s; buildFilters(); renderList(); };

const renderList = () => {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = DATA.filter(d=>{
    const matchQ = !q||d.nama.toLowerCase().includes(q)||d.noRekening.includes(q)||d.alamat.toLowerCase().includes(q);
    const matchProduk = filterProduk==="Semua"||d.produk===filterProduk;
    const s = (fbData[d.no]?.status)||0;
    const label = STATUS_LABELS[s];
    const matchS = filterStatus==="Semua"||label===filterStatus;
    return matchQ&&matchProduk&&matchS;
  });
  document.getElementById("result-count").textContent = `${filtered.length} debitur ditemukan`;
  document.getElementById("list-container").innerHTML = filtered.map(d=>{
    const s = (fbData[d.no]?.status)||0;
    const produkClass = d.produk==="Murabahah"?"produk-mura":"produk-mush";
    return `
    <div class="debitur-card status-${s}" onclick="openModal(${d.no})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="nomor-badge">#${d.no}</span>
            <span style="font-weight:700;font-size:14px">${d.nama}</span>
            <span class="produk-badge ${produkClass}">${d.produk}</span>
          </div>
          <div style="font-size:11px;color:#94a3b8;margin-top:3px">${d.noRekening}</div>
          <div style="font-size:12.5px;color:#334155;margin-top:4px;line-height:1.45;font-weight:500">📍 ${d.alamat}</div>
          ${fbData[d.no]?.catatan?`<div style="font-size:11px;color:#2563eb;margin-top:4px">📝 ${fbData[d.no].catatan}</div>`:""}
        </div>
        <div style="text-align:right;margin-left:10px;flex-shrink:0">
          <div style="color:#dc2626;font-weight:700;font-size:13px">${rp(d.denda)}</div>
          <div style="font-size:10px;color:#94a3b8">tgl ${d.tgl}</div>
          <div class="badge badge-${s}" style="margin-top:4px;display:inline-block">${STATUS_LABELS[s]}</div>
        </div>
      </div>
    </div>`;
  }).join("") || `<div style="text-align:center;padding:40px;color:#94a3b8">Tidak ada data</div>`;
};

const renderRekap = () => {
  const byProduk = {};
  ["Murabahah","Musyarakah"].forEach(p => {
    const subset = DATA.filter(d=>d.produk===p);
    const counts = [0,0,0,0];
    subset.forEach(d=>{ const s=(fbData[d.no]?.status)||0; counts[s]++; });
    const sudahBayar = subset.filter(d=>(fbData[d.no]?.status)===3).reduce((a,d)=>a+d.denda,0);
    const totalDenda = subset.reduce((a,d)=>a+d.denda,0);
    byProduk[p] = {counts, sudahBayar, totalDenda};
  });
  
  const totalMura = byProduk.Murabahah.totalDenda;
  const totalMush = byProduk.Musyarakah.totalDenda;
  const terkumpulMura = byProduk.Murabahah.sudahBayar;
  const terkumpulMush = byProduk.Musyarakah.sudahBayar;
  
  document.getElementById("r-denda").textContent = rp(totalMura+totalMush);
  document.getElementById("r-terkumpul").textContent = rp(terkumpulMura+terkumpulMush);
  
  let html = "";
  ["Murabahah","Musyarakah"].forEach(p => {
    const {counts, totalDenda} = byProduk[p];
    html += `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:8px">${p}</div>`;
    STATUS_LABELS.forEach((s,i)=>{
      html += `<div style="display:flex;align-items:center;margin-bottom:8px">
        <div style="flex:1">
          <div style="font-size:12px;font-weight:600">${s}</div>
          <div class="progress-bar" style="background:${STATUS_BG[i]};width:${Math.round(counts[i]/DATA.filter(d=>d.produk===p).length*100)||0}%"></div>
        </div>
        <div style="font-weight:700;font-size:16px;margin-left:12px;color:${STATUS_FG[i]};min-width:32px;text-align:right">${counts[i]}</div>
      </div>`;
    });
    html += "</div>";
  });
  document.getElementById("rekap-status").innerHTML = html;
};

window.openModal = (no) => {
  currentNo = no;
  const d = DATA.find(x=>x.no===no);
  document.getElementById("m-nama").textContent = d.nama;
  document.getElementById("m-rek").textContent = d.noRekening;
  document.getElementById("m-denda").textContent = rp(d.denda);
  document.getElementById("m-alamat").textContent = d.alamat;
  document.getElementById("m-tgl").textContent = d.tgl;
  document.getElementById("m-pendebetan").textContent = d.pendebetan;
  document.getElementById("m-catatan").value = fbData[no]?.catatan||"";
  updateModalStatus();
  const upd = fbData[no]?.updatedAt;
  document.getElementById("m-updated").textContent = upd ? `Update terakhir: ${new Date(upd).toLocaleString("id-ID")}` : "";
  document.getElementById("modal").classList.add("open");
};

const updateModalStatus = () => {
  const s = (fbData[currentNo]?.status)||0;
  document.getElementById("status-grid").innerHTML = STATUS_LABELS.map((label,i)=>`
    <button class="status-btn${s===i?" active-"+i:""}" onclick="setStatusModal(${i})">${label}</button>
  `).join("");
};

window.setStatusModal = (val) => {
  if(!fbData[currentNo]) fbData[currentNo]={};
  fbData[currentNo].status = val;
  updateModalStatus();
};

window.closeModal = (e) => {
  if(e.target.id==="modal") { currentNo=null; document.getElementById("modal").classList.remove("open"); }
};

window.saveAndClose = async () => {
  const s = (fbData[currentNo]?.status)||0;
  const catatan = document.getElementById("m-catatan").value;
  await update(ref(db,`kunjungan_murabahah/${currentNo}`),{
    status: s,
    catatan: catatan,
    updatedAt: Date.now(),
  });
  showToast("✅ Tersimpan!");
  currentNo=null;
  document.getElementById("modal").classList.remove("open");
};

const showToast = (msg) => {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
};

// Init
buildProdukFilters();
buildFilters();
renderList();
renderRekap();
document.getElementById("search").addEventListener("input", renderList);
</script>
</body>
</html>
